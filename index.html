<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Project Billing System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
}


.navbar{
    background:#111827;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    background:linear-gradient(to right,#2563eb,#38bdf8);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:42px;
}

.container{
    width:90%;
    margin:auto;
    margin-top:40px;
}

.input-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.input-box h2{
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    padding:12px 18px;
    background:#6118a5;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0e0d0d;
}

.bill-box{
    margin-top:30px;
    background:rgb(0, 0, 0);
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th,table td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

table th{
    background:#2563eb;
    color:white;
}

.total{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

.receipt{
    margin-top:25px;
    background:#f8fafc;
    padding:20px;
    border-radius:10px;
    border:1px solid #ccc;
}

.history{
    margin-top:30px;
}

.history-item{
    background:#dbeafe;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
}

.footer{
    margin-top:40px;
    background:#111827;
    color:white;
    text-align:center;
    padding:15px;
}

</style>
</head>

<body>


<div class="navbar">

<div class="logo">
Project Billing System
</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Billing</a>
<a href="#">Contact</a>
</div>

</div>


<div class="hero">
<h1>Project Billing System</h1>
<p>Billing System</p>
</div>

<div class="container">

<div class="input-box">

<h2>Add Products</h2>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="product">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" id="price">
</div>

<div class="input-group">
<label>Quantity</label>
<input type="number" id="qty">
</div>

<button onclick="addProduct()">
Add Product
</button>

</div>


<div class="bill-box">

<h2>Billing Receipt</h2>

<table>

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
</tr>
</thead>

<tbody id="bill-data">

</tbody>

</table>

<div class="total" id="grand-total">
Grand Total : ₹0
</div>

<button onclick="generateReceipt()">
Generate Final Receipt
</button>

<div class="receipt" id="receipt">
Receipt will appear here
</div>


<div class="history">

<h3>Billing History</h3>

<div id="history-list"></div>

</div>

</div>

</div>



<div class="footer">
© 2026 Project Billing System | Designed by Sampreetha
</div>

<script>

let total=0;

function addProduct(){

    let product=document.getElementById("product").value;

    let price=parseInt(document.getElementById("price").value);

    let qty=parseInt(document.getElementById("qty").value);

    let finalPrice=price*qty;

    total+=finalPrice;

    document.getElementById("bill-data").innerHTML+=`

    <tr>
    <td>${product}</td>
    <td>₹${price}</td>
    <td>${qty}</td>
    <td>₹${finalPrice}</td>
    </tr>

    `;

    document.getElementById("grand-total").innerHTML=
    "Grand Total : ₹"+total;

    document.getElementById("product").value="";
    document.getElementById("price").value="";
    document.getElementById("qty").value="";
}

function generateReceipt(){

    let receipt=document.getElementById("receipt");

    receipt.innerHTML=`

    <h3>Receipt Generated Successfully</h3>

    <br>

    <b>Total Amount : ₹${total}</b>

    <br><br>

    Thank you for shopping with NovaMart!

    `;

    document.getElementById("history-list").innerHTML+=`

    <div class="history-item">
    Bill Generated - ₹${total}
    </div>

    `;
}

</script>

</body>
</html>
