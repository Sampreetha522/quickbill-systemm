<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Billing System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f8f5f2;
}

/* NAVBAR */

.navbar{
    background:#1b1b2f;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ffb703;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#ffb703;
}

/* HERO */

.hero{
    background:linear-gradient(to right,#ff6b6b,#ff9f1c,#2ec4b6);
    color:white;
    text-align:center;
    padding:70px 20px;
}

.hero h1{
    font-size:45px;
}

.hero p{
    margin-top:10px;
    font-size:18px;
}

/* MAIN */

.container{
    width:90%;
    margin:auto;
    margin-top:40px;
}

/* INPUT SECTION */

.input-box{
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.input-box h2{
    margin-bottom:20px;
    color:#1b1b2f;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
    color:#333;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#2ec4b6;
}

button{
    padding:14px 20px;
    background:#2ec4b6;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:10px;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#239b8f;
}

/* BILL SECTION */

.bill-box{
    margin-top:35px;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.bill-box h2{
    color:#1b1b2f;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
}

table th,table td{
    border:1px solid #ddd;
    padding:14px;
    text-align:center;
}

table th{
    background:#ff6b6b;
    color:white;
}

table tr:nth-child(even){
    background:#fdf2f2;
}

.total{
    margin-top:25px;
    font-size:26px;
    font-weight:bold;
    color:#1b1b2f;
}

/* RECEIPT */

.receipt{
    margin-top:30px;
    background:#fffaf0;
    padding:20px;
    border-radius:12px;
    border-left:6px solid #ff9f1c;
    font-size:17px;
}

/* HISTORY */

.history{
    margin-top:35px;
}

.history h3{
    color:#1b1b2f;
}

.history-item{
    background:#fff3cd;
    padding:14px;
    margin-top:12px;
    border-radius:10px;
    border-left:5px solid #ffb703;
}

/* FOOTER */

.footer{
    margin-top:50px;
    background:#1b1b2f;
    color:white;
    text-align:center;
    padding:18px;
    font-size:15px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">
Billing System
</div>

<div class="nav-links">
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Billing</a>
<a href="#">Contact</a>
</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>Billing System</h1>

<p>
Billing System
</p>

</div>

<!-- MAIN -->

<div class="container">

<!-- PRODUCT INPUT -->

<div class="input-box">

<h2>Add Products</h2>

<div class="input-group">
<label>Product Name</label>
<input type="text" id="product" placeholder="Enter product name">
</div>

<div class="input-group">
<label>Price</label>
<input type="number" id="price" placeholder="Enter price">
</div>

<div class="input-group">
<label>Quantity</label>
<input type="number" id="qty" placeholder="Enter quantity">
</div>

<button onclick="addProduct()">
Add Product
</button>

</div>

<!-- BILL -->

<div class="bill-box">

<h2>Billing Receipt</h2>

<table>

<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
</tr>
</thead>

<tbody id="bill-data">

</tbody>

</table>

<div class="total" id="grand-total">
Grand Total : ₹0
</div>

<button onclick="generateReceipt()">
Generate Final Receipt
</button>

<!-- RECEIPT -->

<div class="receipt" id="receipt">
Receipt will appear here
</div>

<!-- HISTORY -->

<div class="history">

<h3>Billing History</h3>

<div id="history-list"></div>

</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">
© 2026 Billing System | Designed by Sampreetha
</div>

<script>

let total=0;

function addProduct(){

    let product=document.getElementById("product").value;

    let price=parseInt(document.getElementById("price").value);

    let qty=parseInt(document.getElementById("qty").value);

    let finalPrice=price*qty;

    total+=finalPrice;

    document.getElementById("bill-data").innerHTML+=`

    <tr>
    <td>${product}</td>
    <td>₹${price}</td>
    <td>${qty}</td>
    <td>₹${finalPrice}</td>
    </tr>

    `;

    document.getElementById("grand-total").innerHTML=
    "Grand Total : ₹"+total;

    document.getElementById("product").value="";
    document.getElementById("price").value="";
    document.getElementById("qty").value="";
}

function generateReceipt(){

    let receipt=document.getElementById("receipt");

    receipt.innerHTML=`

    <h3>Receipt Generated Successfully ✅</h3>

    <br>

    <b>Total Amount : ₹${total}</b>

    <br><br>

    Thank you for using Billing System 🛒

    `;

    document.getElementById("history-list").innerHTML+=`

    <div class="history-item">
    Bill Generated Successfully - ₹${total}
    </div>

    `;
}

</script>

</body>
</html>
