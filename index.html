<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBill Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* NAVBAR */

.navbar{
    background:#111827;
    color:white;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#38bdf8;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

/* MAIN */

.container{
    display:flex;
    gap:30px;
    padding:30px;
}

/* PRODUCTS */

.products{
    flex:2;
}

.products h2{
    margin-bottom:20px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:15px 0 10px;
}

.card p{
    color:#555;
    margin-bottom:10px;
}

.card button{
    background:#38bdf8;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

.card button:hover{
    background:#0284c7;
}

/* BILL SECTION */

.bill-section{
    flex:1;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    height:fit-content;
}

.bill-section h2{
    margin-bottom:20px;
}

.cart-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    border-bottom:1px solid #ddd;
    padding-bottom:8px;
}

.total{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.generate-btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#111827;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

/* RECEIPT */

.receipt{
    margin-top:25px;
    background:#f9fafb;
    padding:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* HISTORY */

.history{
    margin-top:25px;
}

.history-item{
    background:#eef2ff;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* FOOTER */

.footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
    <div class="logo">QuickBill Store</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Bills</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- MAIN -->

<div class="container">

<!-- PRODUCTS -->

<div class="products">

<h2>Available Products</h2>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 15</h3>
<p>₹80000</p>
<button onclick="addToCart('iPhone 15',80000)">
Add to Bill
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Smart Watch</h3>
<p>₹5000</p>
<button onclick="addToCart('Smart Watch',5000)">
Add to Bill
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224f3f1">
<h3>Headphones</h3>
<p>₹3000</p>
<button onclick="addToCart('Headphones',3000)">
Add to Bill
</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714739-489689fd1ca8">
<h3>Laptop</h3>
<p>₹65000</p>
<button onclick="addToCart('Laptop',65000)">
Add to Bill
</button>
</div>

</div>
</div>

<!-- BILL -->

<div class="bill-section">

<h2>Billing Receipt</h2>

<div id="cart"></div>

<div class="total" id="total">
Total: ₹0
</div>

<button class="generate-btn" onclick="generateReceipt()">
Generate Receipt
</button>

<div class="receipt" id="receipt">
Receipt will appear here
</div>

<div class="history">
<h3>Billing History</h3>

<div id="history-list"></div>
</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer">
© 2026 QuickBill Store | Designed by Sampreetha
</div>

<script>

let cart=[];
let total=0;

function addToCart(product,price){

    cart.push({product,price});

    total+=price;

    displayCart();
}

function displayCart(){

    let cartDiv=document.getElementById("cart");

    cartDiv.innerHTML="";

    cart.forEach(item=>{

        cartDiv.innerHTML+=`
        <div class="cart-item">
            <span>${item.product}</span>
            <span>₹${item.price}</span>
        </div>
        `;
    });

    document.getElementById("total").innerHTML=
    "Total: ₹"+total;
}

function generateReceipt(){

    let receipt=document.getElementById("receipt");

    let text="<h3>Receipt</h3><br>";

    cart.forEach(item=>{
        text+=`${item.product} - ₹${item.price}<br>`;
    });

    text+=`<br><b>Total Amount: ₹${total}</b>`;

    receipt.innerHTML=text;

    let history=document.getElementById("history-list");

    history.innerHTML+=`
    <div class="history-item">
        Bill Generated - ₹${total}
    </div>
    `;

    cart=[];
    total=0;

    displayCart();
}

</script>

</body>
</html>
